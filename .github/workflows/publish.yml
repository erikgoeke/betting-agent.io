name: Publish MLB report to GitHub Pages

on:
  schedule:
    # 11:00 UTC (~7am ET) daily -- well before the earliest MLB games. Adjust for
    # your timezone/preference; this repo's report is regenerated fresh each run.
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      # Persists data/ (historical game + player-log cache) and models/ (trained
      # model) across otherwise-ephemeral runners. The player-prop cache has a 20h
      # TTL by design, so on this once-daily schedule it's mostly refetched anyway --
      # this mainly saves the multi-season team-game history from being rebuilt from
      # scratch every run.
      - name: Restore data/model cache
        uses: actions/cache@v4
        with:
          path: |
            data/
            models/
          key: sba-cache-${{ github.run_id }}
          restore-keys: |
            sba-cache-

      - name: Fetch historical game data
        run: uv run sba fetch-data

      - name: Train model
        run: uv run sba train

      - name: Generate report
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: uv run sba report --output public/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
