name: Publish MLB report to GitHub Pages

on:
  schedule:
    # 10:23 UTC (~6:23am ET) daily -- well before the earliest MLB games. GitHub's
    # scheduler delays top-of-hour crons the most (heavily subscribed); an off-peak
    # minute gets picked up more promptly, and the early start leaves slack for the
    # delays that still happen.
    - cron: "23 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      # Persists data/ (historical game + player-log cache), models/ (trained
      # model), and logs/ (the picks log that powers the graded-results section)
      # across otherwise-ephemeral runners. The player-prop cache has a 20h TTL
      # by design, so on this once-daily schedule it's mostly refetched anyway --
      # this mainly saves the multi-season team-game history from being rebuilt
      # from scratch every run, and carries yesterday's picks forward for grading.
      - name: Restore data/model/picks-log cache
        uses: actions/cache@v4
        with:
          path: |
            data/
            models/
            logs/
          key: sba-cache-${{ github.run_id }}
          restore-keys: |
            sba-cache-

      - name: Fetch historical game data
        run: uv run sba fetch-data

      - name: Train model
        run: uv run sba train

      - name: Generate report
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PAGE_PASSWORD: ${{ secrets.PAGE_PASSWORD }}
        run: uv run sba report --output public/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
